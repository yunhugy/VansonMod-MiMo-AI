name: Build VansonMod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        env:
          THEOS: /Users/runner/theos
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p $THEOS
          # Clone Theos
          git clone --recursive https://github.com/theos/theos.git $THEOS
          # Download patched SDKs using GitHub token
          SDK_TAG=$(curl -sH "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/theos/sdks/releases/latest" | \
            python3 -c "import sys,json; print(json.load(sys.stdin).get('tag_name','master'))")
          echo "Downloading SDK tag: $SDK_TAG"
          curl -sL -H "Authorization: Bearer $GITHUB_TOKEN" \
            "https://api.github.com/repos/theos/sdks/tarball/$SDK_TAG" \
            -o /tmp/sdks.tar.gz
          mkdir -p $THEOS/sdks
          tar xzf /tmp/sdks.tar.gz -C /tmp/sdks_extract 2>/dev/null || \
            (mkdir -p /tmp/sdks_extract && tar xzf /tmp/sdks.tar.gz -C /tmp/sdks_extract)
          # Move SDKs into place
          SDK_DIR=$(find /tmp/sdks_extract -maxdepth 1 -type d | tail -1)
          if [ -d "$SDK_DIR" ]; then
            cp -r $SDK_DIR/*.sdk $THEOS/sdks/ 2>/dev/null || \
            find $SDK_DIR -name "*.sdk" -maxdepth 1 -exec cp -r {} $THEOS/sdks/ \;
          fi
          ls -la $THEOS/sdks/ || echo "No SDKs found"
          echo "THEOS=$THEOS" >> $GITHUB_ENV

      - name: Build TIPA
        env:
          THEOS: /Users/runner/theos
        run: |
          brew install ldid
          export PATH="/opt/homebrew/bin:$THEOS/bin:$PATH"
          which ldid && which make
          make clean package FINALPACKAGE=1 DEBUG=0 2>&1

      - name: Find TIPA
        id: find_tipa
        run: |
          TIPA=$(find . -name "*.tipa" -type f | head -1)
          echo "tipa_path=$TIPA" >> $GITHUB_OUTPUT
          echo "Found: $TIPA"

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VansonMod-MiMo-AI
          path: ${{ steps.find_tipa.outputs.tipa_path }}
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "VansonMod MiMo AI Build #${{ github.run_number }}"
          files: ${{ steps.find_tipa.outputs.tipa_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
