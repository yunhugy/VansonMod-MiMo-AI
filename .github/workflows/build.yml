name: Build VansonMod

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Theos
        run: |
          export THEOS=~/theos
          sudo mkdir -p $THEOS
          sudo chown $(whoami) $THEOS
          bash -c "$(curl -fsSL https://raw.githubusercontent.com/theos/theos/master/bin/install-theos)"

      - name: Build TIPA
        run: |
          export THEOS=~/theos
          export PATH="$THEOS/bin:$PATH"
          make clean package FINALPACKAGE=1 DEBUG=0 2>&1

      - name: Find TIPA
        id: find_tipa
        run: |
          TIPA=$(find . -name "*.tipa" -type f | head -1)
          echo "tipa_path=$TIPA" >> $GITHUB_OUTPUT
          echo "Found: $TIPA"

      - name: Upload TIPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: VansonMod-MiMo-AI
          path: ${{ steps.find_tipa.outputs.tipa_path }}
          if-no-files-found: error

      - name: Create Release
        if: github.ref == 'refs/heads/main'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: build-${{ github.run_number }}
          name: "VansonMod MiMo AI Build #${{ github.run_number }}"
          files: ${{ steps.find_tipa.outputs.tipa_path }}
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
